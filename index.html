<!DOCTYPE html>
<html>
<head>
  <title>MCT</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    nav {
      background: #111;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
    }

    .hero {
      height: 90vh;
      background: linear-gradient(to right, #4f46e5, #06b6d4);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 5px;
    }

    section {
      padding: 60px 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 200px;
      background: #f4f4f4;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<nav>
  <h2>MCT</h2>
  <div>Solutions for Companies</div>
</nav>

<div class="hero">
  <h1>We build smart solutions for companies</h1>
  <p>Using data, simulation, and optimization</p>
  <a href="#contact" class="btn">Contact Us</a>
</div>

<section>
  <h2>What We Do</h2>
  <div class="cards">
    <div class="card">Process Simulation</div>
    <div class="card">Data Analytics</div>
    <div class="card">Optimization Models</div>
  </div>
</section>

<section>
  <h2>About</h2>
  <p>We help companies make better decisions using data-driven approaches.</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

</body>
</html>
